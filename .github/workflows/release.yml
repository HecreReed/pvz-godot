name: Release

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: Optional git ref to build
        required: false
        type: string
      release_tag:
        description: Optional tag to publish artifacts to
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  GODOT_RELEASE_TAG: 4.6-stable
  GODOT_TEMPLATE_DIR: 4.6.stable
  GODOT_BASE_URL: https://github.com/godotengine/godot-builds/releases/download/4.6-stable

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
            preset: Windows Desktop
            asset_name: pvz-godot-windows.zip
            editor_archive: Godot_v4.6-stable_win64.exe.zip
            export_path: build/releases/windows/pvz-godot.exe
          - target: macos
            os: macos-latest
            preset: macOS
            asset_name: pvz-godot-macos.zip
            editor_archive: Godot_v4.6-stable_macos.universal.zip
            export_path: build/releases/macos/pvz-godot.app
          - target: web
            os: ubuntu-latest
            preset: Web
            asset_name: pvz-godot-web.zip
            editor_archive: Godot_v4.6-stable_linux.x86_64.zip
            export_path: build/releases/web/index.html
          - target: android
            os: ubuntu-latest
            preset: Android
            asset_name: pvz-godot-android.apk
            editor_archive: Godot_v4.6-stable_linux.x86_64.zip
            export_path: build/releases/android/pvz-godot.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.build_ref || github.ref }}
          lfs: false

      - name: Stamp project version
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            raw_version="${{ github.event.inputs.release_tag }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            raw_version="${GITHUB_REF_NAME}"
          else
            raw_version="dev-${GITHUB_SHA::7}"
          fi
          export BUILD_VERSION="${raw_version#v}"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["BUILD_VERSION"]
          
          def android_version_code(version_string: str) -> int:
            parts = [int(token) for token in re.findall(r"\d+", version_string)[:3]]
            while len(parts) < 3:
              parts.append(0)
            major, minor, patch = parts
            code = major * 10000 + minor * 100 + patch
            return code if code > 0 else 1

          path = Path("project.godot")
          text = path.read_text(encoding="utf-8")
          if 'config/version="' in text:
            text = re.sub(r'config/version="[^"]*"', f'config/version="{version}"', text, count=1)
          else:
            text = text.replace('config/name="植物大战僵尸svg版"\n', f'config/name="植物大战僵尸svg版"\nconfig/version="{version}"\n', 1)
          path.write_text(text, encoding="utf-8")

          export_presets = Path("export_presets.cfg")
          preset_text = export_presets.read_text(encoding="utf-8")
          replacements = {
            "application/file_version": f'"{version}"',
            "application/product_version": f'"{version}"',
            "application/product_name": '"植物大战僵尸svg版"',
            "application/short_version": f'"{version}"',
            "application/version": f'"{version}"',
            "package/name": '"植物大战僵尸svg版"',
            "version/code": str(android_version_code(version)),
            "version/name": f'"{version}"',
          }
          for key, value in replacements.items():
            preset_text = re.sub(rf'^{re.escape(key)}=.*$', f'{key}={value}', preset_text, flags=re.MULTILINE)
          export_presets.write_text(preset_text, encoding="utf-8")
          print(f"Stamped project/export versions: {version} (android code {android_version_code(version)})")
          PY

      - name: Stamp project version
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.release_tag }}") {
            $rawVersion = "${{ github.event.inputs.release_tag }}"
          } elseif ($env:GITHUB_REF_NAME.StartsWith("v")) {
            $rawVersion = $env:GITHUB_REF_NAME
          } else {
            $rawVersion = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          $version = $rawVersion.TrimStart('v')
          $versionParts = [regex]::Matches($version, '\d+')
          $parts = @()
          foreach ($match in $versionParts) {
            $parts += [int]$match.Value
            if ($parts.Count -ge 3) {
              break
            }
          }
          while ($parts.Count -lt 3) {
            $parts += 0
          }
          $versionCode = ($parts[0] * 10000) + ($parts[1] * 100) + $parts[2]
          if ($versionCode -le 0) {
            $versionCode = 1
          }

          $projectPath = "project.godot"
          $text = Get-Content $projectPath -Raw -Encoding UTF8
          if ($text -match 'config/version="[^"]*"') {
            $text = [regex]::Replace($text, 'config/version="[^"]*"', "config/version=`"$version`"", 1)
          } else {
            $text = $text.Replace("config/name=`"植物大战僵尸svg版`"`n", "config/name=`"植物大战僵尸svg版`"`nconfig/version=`"$version`"`n")
          }
          Set-Content $projectPath -Value $text -Encoding UTF8

          $presetPath = "export_presets.cfg"
          $presetText = Get-Content $presetPath -Raw -Encoding UTF8
          $replacements = [ordered]@{
            "application/file_version" = "`"$version`""
            "application/product_version" = "`"$version`""
            "application/product_name" = "`"植物大战僵尸svg版`""
            "application/short_version" = "`"$version`""
            "application/version" = "`"$version`""
            "package/name" = "`"植物大战僵尸svg版`""
            "version/code" = "$versionCode"
            "version/name" = "`"$version`""
          }
          foreach ($entry in $replacements.GetEnumerator()) {
            $escapedKey = [regex]::Escape($entry.Key)
            $presetText = [regex]::Replace($presetText, "(?m)^$escapedKey=.*$", "$($entry.Key)=$($entry.Value)")
          }
          Set-Content $presetPath -Value $presetText -Encoding UTF8
          Write-Host "Stamped project/export versions: $version (android code $versionCode)"

      - name: Set up Java 17
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        if: matrix.target == 'android'
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Generate Godot Android editor settings
        if: matrix.target == 'android'
        shell: bash
        run: |
          set -euo pipefail
          settings_dir="$HOME/.config/godot"
          sdk_path="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"

          if [ -z "$sdk_path" ]; then
            echo "Android SDK path was not configured"
            exit 1
          fi

          mkdir -p "$settings_dir"
          cat > "$settings_dir/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$sdk_path"
          EOF

      - name: Prepare Android signing
        if: matrix.target == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_RELEASE_BASE64: ${{ secrets.ANDROID_KEYSTORE_RELEASE_BASE64 }}
          ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEYSTORE_RELEASE_USER }}
          ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_RELEASE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_RELEASE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_RELEASE_USER}" ] || [ -z "${ANDROID_KEYSTORE_RELEASE_PASSWORD}" ]; then
            echo "Android release signing secrets are missing"
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/android-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_RELEASE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"

          {
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$keystore_path"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$ANDROID_KEYSTORE_RELEASE_USER"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$ANDROID_KEYSTORE_RELEASE_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Clean release directories
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf build/releases dist
          mkdir -p build/godot build/releases dist

      - name: Clean release directories
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item build/releases, dist -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path build/godot, build/releases, dist -Force | Out-Null

      - name: Install Godot and export templates
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $editorDir = Join-Path $env:RUNNER_TEMP 'godot/editor'
          $templatesDir = Join-Path $env:APPDATA 'Godot/export_templates/4.6.stable'
          New-Item -ItemType Directory -Path $editorDir, $templatesDir -Force | Out-Null

          $editorZip = Join-Path $env:RUNNER_TEMP 'godot/editor.zip'
          $templatesTpz = Join-Path $env:RUNNER_TEMP 'godot/templates.tpz'
          Invoke-WebRequest -Uri "${env:GODOT_BASE_URL}/${{ matrix.editor_archive }}" -OutFile $editorZip
          Invoke-WebRequest -Uri "${env:GODOT_BASE_URL}/Godot_v4.6-stable_export_templates.tpz" -OutFile $templatesTpz

          Expand-Archive -LiteralPath $editorZip -DestinationPath $editorDir -Force
          Expand-Archive -LiteralPath $templatesTpz -DestinationPath (Join-Path $env:RUNNER_TEMP 'godot/templates-unpacked') -Force
          Copy-Item (Join-Path $env:RUNNER_TEMP 'godot/templates-unpacked/templates/*') $templatesDir -Recurse -Force

      - name: Install Godot and export templates
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          editor_zip="$RUNNER_TEMP/godot/editor.zip"
          templates_tpz="$RUNNER_TEMP/godot/templates.tpz"
          editor_dir="$RUNNER_TEMP/godot/editor"
          template_dir="$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATE_DIR"

          mkdir -p "$editor_dir" "$template_dir"
          curl -L --fail "$GODOT_BASE_URL/${{ matrix.editor_archive }}" -o "$editor_zip"
          curl -L --fail "$GODOT_BASE_URL/Godot_v4.6-stable_export_templates.tpz" -o "$templates_tpz"

          unzip -q "$editor_zip" -d "$editor_dir"
          unzip -q "$templates_tpz" -d "$RUNNER_TEMP/godot/templates-unpacked"
          cp -R "$RUNNER_TEMP/godot/templates-unpacked/templates/." "$template_dir/"

      - name: Install Godot and export templates
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          editor_zip="$RUNNER_TEMP/godot/editor.zip"
          templates_tpz="$RUNNER_TEMP/godot/templates.tpz"
          editor_dir="$RUNNER_TEMP/godot/editor"
          template_dir="$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_DIR"

          mkdir -p "$editor_dir" "$template_dir"
          curl -L --fail "$GODOT_BASE_URL/${{ matrix.editor_archive }}" -o "$editor_zip"
          curl -L --fail "$GODOT_BASE_URL/Godot_v4.6-stable_export_templates.tpz" -o "$templates_tpz"

          unzip -q "$editor_zip" -d "$editor_dir"
          unzip -q "$templates_tpz" -d "$RUNNER_TEMP/godot/templates-unpacked"
          cp -R "$RUNNER_TEMP/godot/templates-unpacked/templates/." "$template_dir/"

      - name: Prepare export target directory
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path (Split-Path "${{ matrix.export_path }}") -Force | Out-Null

      - name: Prepare export target directory
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ matrix.export_path }}")"

      - name: Export project
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $godotExe = Join-Path $env:RUNNER_TEMP 'godot/editor/Godot_v4.6-stable_win64_console.exe'
          & $godotExe --headless --path $env:GITHUB_WORKSPACE --export-release "${{ matrix.preset }}" "${{ matrix.export_path }}"

      - name: Export project
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/godot/editor/Godot.app/Contents/MacOS/Godot" \
            --headless \
            --path "$GITHUB_WORKSPACE" \
            --export-release "${{ matrix.preset }}" \
            "${{ matrix.export_path }}"

      - name: Export project
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "$RUNNER_TEMP/godot/editor/Godot_v4.6-stable_linux.x86_64"
          "$RUNNER_TEMP/godot/editor/Godot_v4.6-stable_linux.x86_64" \
            --headless \
            --path "$GITHUB_WORKSPACE" \
            --export-release "${{ matrix.preset }}" \
            "${{ matrix.export_path }}"

      - name: Package artifact
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $artifactPath = Join-Path $env:GITHUB_WORKSPACE "dist/${{ matrix.asset_name }}"
          $payload = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'build/releases/windows') | Select-Object -ExpandProperty FullName
          if (-not $payload) {
            throw "No Windows release payload found"
          }
          Compress-Archive -LiteralPath $payload -DestinationPath $artifactPath -Force
          Get-Item $artifactPath | Format-List FullName, Length

      - name: Package artifact
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --keepParent \
            "build/releases/macos/pvz-godot.app" \
            "dist/${{ matrix.asset_name }}"

      - name: Package artifact
        if: matrix.target == 'web'
        shell: bash
        run: |
          set -euo pipefail
          cd build/releases/web
          zip -r "../../../dist/${{ matrix.asset_name }}" .

      - name: Prepare GitHub Pages artifact
        if: matrix.target == 'web'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/releases/pages
          mkdir -p build/releases/pages
          unzip -q "dist/${{ matrix.asset_name }}" -d build/releases/pages
          touch build/releases/pages/.nojekyll
          test -f build/releases/pages/index.html

      - name: Upload GitHub Pages artifact
        if: matrix.target == 'web'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/releases/pages

      - name: Package artifact
        if: matrix.target == 'android'
        shell: bash
        run: |
          set -euo pipefail
          cp "build/releases/android/pvz-godot.apk" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ github.workspace }}/dist/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: pvz-godot-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          gh release upload "$tag" dist/* --clobber

  deploy_pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.release_tag != '' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
